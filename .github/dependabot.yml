# Dependabot: keep GitHub Actions and npm (if added later) up to date.
version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
    groups:
      # Group minor/patch bumps to reduce PR noise; majors stay separate.
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'
